name: Build site from markdown

on:
  push:
    branches: [main]
    paths:
      - 'skills-2028-roadmap.md'
      - 'build.js'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate index.html from markdown
        run: node build.js

      - name: Commit regenerated page if it changed
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html unchanged — nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: regenerate index.html from markdown [skip ci]"
            git push
          fi
